services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: document-search-postgres
    environment:
      POSTGRES_DB: document_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-document_search_local_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - document_search_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_search"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  document_search_pgdata:
